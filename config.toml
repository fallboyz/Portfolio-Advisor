[api_keys]
fred = ""  # .env 파일의 FRED_API_KEY 사용

[schedule]
data_update = "0 3 * * *"

[data]
db_path = "data/portfolio.ddb"
raw_dir = "data/raw"
macrotrends_csv = "data/raw/silver_historical.csv"
shiller_excel = "data/raw/ie_data.xls"
shiller_url = "http://www.econ.yale.edu/~shiller/data/ie_data.xls"

[symbols]
silver = "SI=F"
gold = "GC=F"
sp500 = "^GSPC"
ndx = "^NDX"
dxy = "DX-Y.NYB"
vix = "^VIX"

[fred_series]
fed_funds = "FEDFUNDS"
cpi = "CPIAUCSL"
real_rate = "REAINTRATREARAT10Y"
m2 = "M2SL"
gdp = "GDP"
treasury_10y = "DGS10"
treasury_3m = "DGS3MO"

[server]
web_port = 8501
mcp_port = 8001
mcp_host = "0.0.0.0"

[weights_gold]
real_rate = 0.30
m2_gold = 0.30
price_position = 0.20
return_10y = 0.20

[weights_silver]
real_rate = 0.25
m2_gold = 0.25
price_position = 0.15
return_10y = 0.15
gsr = 0.20

[weights_sp500]
cape = 0.35
buffett = 0.25
yield_curve = 0.15
return_10y = 0.25

[weights_ndx]
return_10y = 0.40
return_5y = 0.40
price_position = 0.20

[signals]
strong_precious = -2.0
mild_precious = -1.0
mild_etf = 1.0
strong_etf = 2.0

[drawdown_overlay]
silver_crash_threshold = -40
etf_crash_threshold = -30
silver_rally_threshold = 100
